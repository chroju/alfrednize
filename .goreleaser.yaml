env:
  - GO111MODULE=on
before:
  hooks:
    - go mod tidy
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - 386
      - amd64
      - arm64
archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - none*
changelog:
  skip: true
brews:
  - name: alfrednize
    tap:
      owner: chroju
      name: homebrew-tap
      token:
    url_template: "https://github.com/chroju/alfrednize/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    description: "alfrednize is a so simple command to generate JSON for Alfred."
    homepage: "https://github.com/chroju/alfrednize"
    license: "MIT"
    test: |
      system "#{bin}/alfrednize --version"
    install: |
      bin.install "alfrednize"
